<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown bis zum 1. Juli</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1em;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Restzeit-Rechner</h3>
    <label for="start-time">Start-Datum und Uhrzeit wählen:</label>
    <input type="datetime-local" id="start-time">
    
    <button onclick="berechneRestzeit()">Zeitspanne berechnen</button>

    <div class="result" id="ausgabe">
        Wähle ein Datum, um die verbleibende Zeit bis zum 1. Juli (Mittwoch) anzuzeigen.
    </div>
</div>

<script>
    // Setzt das aktuelle Datum und Uhrzeit als Standardwert in das Input-Feld
    const jetzt = new Date();
    jetzt.setMinutes(jetzt.getMinutes() - jetzt.getTimezoneOffset());
    document.getElementById('start-time').value = jetzt.toISOString().slice(0, 16);

    function berechneRestzeit() {
        const inputWert = document.getElementById('start-time').value;
        if (!inputWert) {
            document.getElementById('ausgabe').innerHTML = "Bitte ein gültiges Datum auswählen!";
            return;
        }

        // Startdatum aus dem Input generieren
        const startDatum = new Date(inputWert);
        
        // Ziel: 1. Juli 2026, 00:00 Uhr
        const zielDatum = new Date('2026-07-01T00:00:00');

        // Differenz in Millisekunden
        let differenz = zielDatum - startDatum;

        if (differenz < 0) {
            document.getElementById('ausgabe').innerHTML = "Das gewählte Datum liegt bereits nach dem 1. Juli!";
            return;
        }

        // Umrechnung der Millisekunden
        const einTag = 1000 * 60 * 60 * 24;
        const eineStunde = 1000 * 60 * 60;
        const eineMinute = 1000 * 60;
        const eineSekunde = 1000;

        const tage = Math.floor(differenz / einTag);
        differenz %= einTag;

        const stunden = Math.floor(differenz / eineStunde);
        differenz %= eineStunde;

        const minuten = Math.floor(differenz / eineMinute);
        differenz %= eineMinute;

        const sekunden = Math.floor(differenz / eineSekunde);

        // Ausgabe formatieren
        document.getElementById('ausgabe').innerHTML = 
            `Verbleibende Zeit:<br>` +
            `🔹 <b>${tage}</b> Tage<br>` +
            `🔹 <b>${stunden}</b> Stunden<br>` +
            `🔹 <b>${minuten}</b> Minuten<br>` +
            `🔹 <b>${sekunden}</b> Sekunden`;
    }
</script>

</body>
</html>
